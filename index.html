
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1e40af">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="MGHR Sales">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
   
    <!-- Enable background execution -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
   
    <title>MGHR Live Sales Dashboard</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,aspect-ratio"></script>
    <script>
        // Suppress Tailwind CDN warning
        tailwind.config = { corePlugins: { preflight: true } };
    </script>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <style>
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-slide-up { animation: slideUp 0.3s ease-out; }
       
        @keyframes shimmer {
            0% { background-position: -1000px 0; }
            100% { background-position: 1000px 0; }
        }
        .shimmer {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 1000px 100%;
            animation: shimmer 2s infinite;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Pill badge */
        .pill-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            font-size: 0.7rem;
            font-weight: 600;
            padding: 0.2rem 0.6rem;
            border-radius: 9999px;
        }

        /* Install prompt */
        .install-prompt {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
            max-width: 90%;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-gray-50 to-gray-100 text-gray-800 font-sans antialiased">
    <div id="app" class="max-w-md mx-auto bg-white min-h-screen shadow-2xl flex flex-col relative">
       
        <!-- Install Prompt (shows when installable) -->
        <div id="install-prompt" class="install-prompt hidden">
            <div class="bg-gradient-to-r from-blue-600 to-blue-700 text-white rounded-2xl shadow-2xl p-4 flex items-center gap-3 animate-slide-up">
                <div class="flex-1">
                    <p class="font-bold text-sm">Install MGHR Sales App</p>
                    <p class="text-xs opacity-90">Get quick access from your home screen</p>
                </div>
                <button onclick="installPWA()" class="bg-white text-blue-600 font-bold text-sm px-4 py-2 rounded-lg hover:bg-blue-50 transition-colors">
                    Install
                </button>
                <button onclick="dismissInstall()" class="text-white/80 hover:text-white">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
        </div>

        <!-- Header -->
        <header class="bg-gradient-to-r from-blue-700 via-blue-600 to-blue-700 text-white p-4 shadow-lg sticky top-0 z-10">
            <div class="flex justify-between items-center mb-2">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center backdrop-blur-sm">
                        <i data-lucide="trending-up" class="w-6 h-6"></i>
                    </div>
                    <div>
                        <h1 class="text-lg font-black tracking-tight">MGHR Sales</h1>
                        <p class="text-xs opacity-90 font-medium">Live Dashboard</p>
                    </div>
                </div>
                <div class="flex flex-col items-end gap-1">
                    <div class="flex items-center gap-2 text-xs font-bold bg-white/20 px-3 py-1.5 rounded-full backdrop-blur-sm">
                        <div id="connection-status" class="w-2 h-2 rounded-full bg-red-400 animate-pulse"></div>
                        <span id="connection-text">Connecting</span>
                    </div>
                </div>
            </div>
        </header>

        <!-- Notification Audio -->
        <audio id="notification-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

        <!-- Content -->
        <div class="flex-1 overflow-y-auto">
            <!-- Stats Grid -->
            <div class="p-4 space-y-3">
                <!-- Main Revenue Card -->
                <div class="bg-gradient-to-br from-blue-600 to-blue-700 rounded-2xl p-6 text-white shadow-xl relative overflow-hidden">
                    <div class="absolute -right-8 -top-8 w-32 h-32 bg-white/10 rounded-full blur-2xl"></div>
                    <div class="absolute -left-8 -bottom-8 w-32 h-32 bg-white/10 rounded-full blur-2xl"></div>
                    <div class="relative z-10">
                        <div class="flex items-center gap-2 mb-2">
                            <i data-lucide="calendar-range" class="w-5 h-5 opacity-80"></i>
                            <p class="text-sm font-bold opacity-90 uppercase tracking-wider">Last 7 Days</p>
                        </div>
                        <div class="flex items-baseline gap-2">
                            <span class="text-3xl font-black">₹</span>
                            <h2 class="text-5xl font-black" id="grand-total">0.00</h2>
                        </div>
                        <div class="mt-3 flex items-center gap-4 text-sm">
                            <div class="flex items-center gap-1.5 opacity-90">
                                <i data-lucide="receipt" class="w-4 h-4"></i>
                                <span id="total-bills" class="font-bold">0 Bills</span>
                            </div>
                            <div class="flex items-center gap-1.5 opacity-90">
                                <i data-lucide="bar-chart-3" class="w-4 h-4"></i>
                                <span id="avg-bill" class="font-bold">₹0 Avg</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Quick Stats -->
                <div class="grid grid-cols-2 gap-3">
                    <div class="bg-gradient-to-br from-emerald-50 to-emerald-100 rounded-xl p-4 border border-emerald-200">
                        <div class="flex items-center gap-2 mb-1">
                            <i data-lucide="trending-up" class="w-4 h-4 text-emerald-600"></i>
                            <p class="text-xs font-bold text-emerald-700 uppercase">Today</p>
                        </div>
                        <p class="text-2xl font-black text-emerald-900" id="today-total">₹0</p>
                        <p class="text-xs text-emerald-600 font-semibold mt-1" id="today-count">0 bills</p>
                    </div>
                    <div class="bg-gradient-to-br from-amber-50 to-amber-100 rounded-xl p-4 border border-amber-200">
                        <div class="flex items-center gap-2 mb-1">
                            <i data-lucide="calendar-clock" class="w-4 h-4 text-amber-600"></i>
                            <p class="text-xs font-bold text-amber-700 uppercase">Yesterday</p>
                        </div>
                        <p class="text-2xl font-black text-amber-900" id="yesterday-total">₹0</p>
                        <p class="text-xs text-amber-600 font-semibold mt-1" id="yesterday-count">0 bills</p>
                    </div>
                </div>
            </div>

            <!-- Daily Records Section -->
            <div class="px-4 pb-6">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-lg font-black text-gray-800 flex items-center gap-2">
                        <i data-lucide="list" class="w-5 h-5"></i>
                        Daily Breakdown
                    </h3>
                    <button onclick="cleanOldData(true)" class="pill-badge bg-blue-100 text-blue-700 hover:bg-blue-200 transition-colors">
                        <i data-lucide="trash-2" class="w-3 h-3"></i>
                        Cleanup
                    </button>
                </div>
               
                <div id="sales-list" class="space-y-3">
                    <!-- Loading State -->
                    <div class="space-y-3">
                        <div class="shimmer h-24 rounded-xl"></div>
                        <div class="shimmer h-24 rounded-xl"></div>
                        <div class="shimmer h-24 rounded-xl"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer class="bg-gray-50 border-t border-gray-200 p-4 text-center">
            <p class="text-xs text-gray-500 font-medium">
                Built with <span class="text-red-500">❤️</span> by
                <span class="font-bold text-gray-700">साले साहब</span>
            </p>
        </footer>
    </div>
   
    <script>
        // Wait for DOM and Lucide to be ready
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof lucide !== 'undefined') {
                lucide.createIcons();
            }
        });

        const MQTT_BROKER = 'wss://broker.hivemq.com:8884/mqtt';
        const MQTT_TOPIC = 'mghr/sales/v1';
       
        let localClientId = localStorage.getItem('mghr_sales_client_id');
        if (!localClientId) {
            localClientId = 'mghr_salesviewer_' + Math.random().toString(16).substr(2, 10);
            localStorage.setItem('mghr_sales_client_id', localClientId);
        }
        const clientId = localClientId;
       
        let salesData = JSON.parse(localStorage.getItem('mghr_sales_data') || '[]');
        let deferredPrompt;
        let wakeLock = null;

        // Request wake lock to keep app alive in background
        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    console.log('Wake Lock acquired');
                   
                    wakeLock.addEventListener('release', () => {
                        console.log('Wake Lock released');
                    });
                }
            } catch (err) {
                console.log('Wake Lock error:', err);
            }
        }

        // Re-acquire wake lock when page becomes visible
        document.addEventListener('visibilitychange', async () => {
            if (wakeLock !== null && document.visibilityState === 'visible') {
                await requestWakeLock();
            }
        });

        // Request notification permission
        async function requestNotificationPermission() {
            if ('Notification' in window && Notification.permission === 'default') {
                const permission = await Notification.requestPermission();
                console.log('Notification permission:', permission);
                return permission === 'granted';
            }
            return Notification.permission === 'granted';
        }

        // Show notification
        function showNotification(title, body) {
            if ('Notification' in window && Notification.permission === 'granted') {
                const notification = new Notification(title, {
                    body: body,
                    icon: 'icon-192.png',
                    badge: 'icon-192.png',
                    tag: 'mghr-sales',
                    requireInteraction: false,
                    silent: false
                });

                // Auto close after 5 seconds
                setTimeout(() => notification.close(), 5000);

                notification.onclick = () => {
                    window.focus();
                    notification.close();
                };
            }
        }

        // Enable audio and notifications on first user interaction
        let audioEnabled = false;
        async function enableAudioAndNotifications() {
            if (!audioEnabled) {
                const audio = document.getElementById('notification-sound');
                try {
                    await audio.play();
                    audio.pause();
                    audio.currentTime = 0;
                    audioEnabled = true;
                    console.log('Audio enabled');
                } catch (e) {
                    console.log('Audio enable failed:', e);
                }
               
                await requestNotificationPermission();
                await requestWakeLock();
            }
        }

        // Attach to user interactions
        document.addEventListener('click', enableAudioAndNotifications, { once: true });
        document.addEventListener('touchstart', enableAudioAndNotifications, { once: true });

        // PWA Install Prompt
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            const dismissed = localStorage.getItem('install_prompt_dismissed');
            if (!dismissed) {
                document.getElementById('install-prompt').classList.remove('hidden');
            }
        });

        window.installPWA = async function() {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            console.log(`User response: ${outcome}`);
            deferredPrompt = null;
            document.getElementById('install-prompt').classList.add('hidden');
        };

        window.dismissInstall = function() {
            document.getElementById('install-prompt').classList.add('hidden');
            localStorage.setItem('install_prompt_dismissed', 'true');
        };

        // Register Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('SW registered', reg))
                .catch(err => console.log('SW registration failed', err));
        }

        // Clean up data older than 7 days
        function cleanOldData(force = false) {
            const beforeLength = salesData.length;
            const sevenDaysAgo = new Date();
            sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);
            sevenDaysAgo.setHours(0,0,0,0);
           
            salesData = salesData.filter(sale => {
                const saleDate = new Date(sale.timestamp);
                return saleDate >= sevenDaysAgo;
            });
           
            saveData();

            if (force) {
                const removed = beforeLength - salesData.length;
                if (removed === 0) {
                    showToast('No old data to clean', 'info');
                } else {
                    showToast(`Cleaned ${removed} old records`, 'success');
                }
            }
        }

        function saveData() {
            localStorage.setItem('mghr_sales_data', JSON.stringify(salesData));
            render();
        }

        function showToast(message, type = 'info') {
            const colors = {
                success: 'bg-green-600',
                info: 'bg-blue-600',
                error: 'bg-red-600'
            };
            const toast = document.createElement('div');
            toast.className = `fixed top-20 left-1/2 -translate-x-1/2 ${colors[type]} text-white px-6 py-3 rounded-full shadow-2xl z-50 animate-slide-up font-bold text-sm`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function render() {
            const grouped = {};
            let grandTotal = 0;
            let totalBills = 0;

            const today = new Date();
            today.setHours(0,0,0,0);
            const yesterday = new Date(today);
            yesterday.setDate(yesterday.getDate() - 1);

            let todayTotal = 0, todayCount = 0;
            let yesterdayTotal = 0, yesterdayCount = 0;

            salesData.forEach(sale => {
                const dateObj = new Date(sale.timestamp);
                const dateStr = dateObj.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
               
                if (!grouped[dateStr]) {
                    const startOfDay = new Date(dateObj);
                    startOfDay.setHours(0,0,0,0);
                    grouped[dateStr] = { total: 0, count: 0, sales: [], sortValue: startOfDay.getTime() };
                }
                const saleTotal = parseFloat(sale.total) || 0;
                grouped[dateStr].total += saleTotal;
                grouped[dateStr].count++;
                grouped[dateStr].sales.push(sale);
                grandTotal += saleTotal;
                totalBills++;

                // Today/Yesterday stats
                const saleDay = new Date(dateObj);
                saleDay.setHours(0,0,0,0);
                if (saleDay.getTime() === today.getTime()) {
                    todayTotal += saleTotal;
                    todayCount++;
                } else if (saleDay.getTime() === yesterday.getTime()) {
                    yesterdayTotal += saleTotal;
                    yesterdayCount++;
                }
            });

            document.getElementById('grand-total').textContent = grandTotal.toFixed(2);
            document.getElementById('total-bills').textContent = `${totalBills} Bills`;
            document.getElementById('avg-bill').textContent = totalBills > 0 ? `₹${(grandTotal/totalBills).toFixed(0)} Avg` : '₹0 Avg';
           
            document.getElementById('today-total').textContent = `₹${todayTotal.toFixed(0)}`;
            document.getElementById('today-count').textContent = `${todayCount} bills`;
            document.getElementById('yesterday-total').textContent = `₹${yesterdayTotal.toFixed(0)}`;
            document.getElementById('yesterday-count').textContent = `${yesterdayCount} bills`;

            const listEl = document.getElementById('sales-list');
            listEl.innerHTML = '';

            const sortedDates = Object.keys(grouped).sort((a,b) => grouped[b].sortValue - grouped[a].sortValue);

            if(sortedDates.length === 0) {
                listEl.innerHTML = `
                    <div class="text-center py-16 bg-gradient-to-br from-gray-50 to-gray-100 rounded-2xl border-2 border-dashed border-gray-300">
                        <div class="w-16 h-16 mx-auto mb-4 bg-gray-200 rounded-full flex items-center justify-center">
                            <i data-lucide="inbox" class="w-8 h-8 text-gray-400"></i>
                        </div>
                        <p class="font-bold text-gray-700 text-lg">No Sales Yet</p>
                        <p class="text-sm text-gray-500 mt-1">Sales data will appear here automatically</p>
                    </div>`;
                lucide.createIcons();
                return;
            }

            sortedDates.forEach((date, index) => {
                const group = grouped[date];
                const dayCard = document.createElement('div');
                dayCard.className = 'bg-white rounded-xl shadow-md border border-gray-200 overflow-hidden transition-all hover:shadow-lg';
                dayCard.style.animationDelay = `${index * 50}ms`;
                dayCard.classList.add('animate-slide-up');
               
                dayCard.innerHTML = `
                    <div class="bg-gradient-to-r from-gray-50 to-white flex justify-between items-center p-4 cursor-pointer hover:from-blue-50 hover:to-blue-50/50 active:from-blue-100 active:to-blue-100/50 transition-all" onclick="toggleDay(this)">
                        <div class="flex items-center gap-3">
                            <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-blue-500 to-blue-600 flex items-center justify-center text-white shadow-lg">
                                <i data-lucide="calendar-days" class="w-6 h-6"></i>
                            </div>
                            <div>
                                <div class="font-black text-gray-900 text-base">${date}</div>
                                <div class="pill-badge bg-gray-100 text-gray-600 mt-1">
                                    <i data-lucide="receipt" class="w-3 h-3"></i>
                                    ${group.count} Bills
                                </div>
                            </div>
                        </div>
                        <div class="text-right">
                            <div class="font-black text-green-600 text-xl">₹${group.total.toFixed(2)}</div>
                            <div class="text-xs text-gray-500 font-semibold mt-1">₹${(group.total/group.count).toFixed(0)} avg</div>
                        </div>
                    </div>
                    <div class="hidden divide-y divide-gray-100 bg-gray-50/50">
                        ${group.sales.sort((a,b)=>b.timestamp - a.timestamp).map(s => `
                            <div class="p-4 flex justify-between items-center hover:bg-white transition-colors">
                                <div class="flex-1">
                                    <div class="flex items-center gap-2 mb-1">
                                        <span class="font-black text-gray-800 text-base">#${s.billNo}</span>
                                        <span class="pill-badge ${s.label === 'Customer App' ? 'bg-purple-100 text-purple-700' : 'bg-gray-100 text-gray-600'}">
                                            ${s.label === 'Customer App' ? '<i data-lucide="smartphone" class="w-3 h-3"></i>' : '<i data-lucide="monitor" class="w-3 h-3"></i>'}
                                            ${s.label || 'POS'}
                                        </span>
                                    </div>
                                    <div class="text-xs text-gray-500 font-semibold flex items-center gap-1.5">
                                        <i data-lucide="clock" class="w-3.5 h-3.5"></i>
                                        ${new Date(s.timestamp).toLocaleTimeString('en-IN', {hour: '2-digit', minute:'2-digit', hour12: true})}
                                    </div>
                                </div>
                                <div class="font-black text-gray-900 text-lg">₹${parseFloat(s.total).toFixed(2)}</div>
                            </div>
                        `).join('')}
                    </div>
                `;
                listEl.appendChild(dayCard);
            });
           
            // Safely recreate icons
            if (typeof lucide !== 'undefined') {
                lucide.createIcons();
            }
        }

        function toggleDay(element) {
            const details = element.nextElementSibling;
            details.classList.toggle('hidden');
        }

        function initMQTT() {
            const statusEl = document.getElementById('connection-status');
            const statusText = document.getElementById('connection-text');
           
            const client = mqtt.connect(MQTT_BROKER, {
                clientId: clientId,
                clean: false,
                keepalive: 30,
                reconnectPeriod: 2000
            });

            client.on('connect', () => {
                console.log('Connected to MQTT');
                statusEl.className = 'w-2 h-2 rounded-full bg-green-400';
                statusText.textContent = 'Live';
                statusText.className = 'opacity-100';
               
                client.subscribe(MQTT_TOPIC, { qos: 1 }, (err) => {
                    if (err) console.error('Subscribe err:', err);
                });
            });

            client.on('reconnect', () => {
                statusEl.className = 'w-2 h-2 rounded-full bg-yellow-400 animate-pulse';
                statusText.textContent = 'Reconnecting';
            });

            client.on('offline', () => {
                statusEl.className = 'w-2 h-2 rounded-full bg-red-400';
                statusText.textContent = 'Offline';
            });

            client.on('message', (topic, message) => {
                if (topic === MQTT_TOPIC) {
                    try {
                        const payload = JSON.parse(message.toString());
                       
                        const exists = salesData.some(s => s.billNo === payload.billNo && s.timestamp === payload.timestamp);
                        if (!exists) {
                            salesData.push(payload);
                            saveData();
                           
                            // Notify service worker for background notification
                            if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
                                navigator.serviceWorker.controller.postMessage({
                                    type: 'NEW_SALE',
                                    billNo: payload.billNo,
                                    total: payload.total,
                                    label: payload.label
                                });
                            }
                           
                            // Play notification sound
                            const audio = document.getElementById('notification-sound');
                            audio.currentTime = 0;
                            audio.volume = 1.0;
                           
                            const playPromise = audio.play();
                            if (playPromise !== undefined) {
                                playPromise
                                    .then(() => console.log('Sound played'))
                                    .catch(e => console.log('Sound blocked:', e));
                            }

                            // Show system notification
                            showNotification(
                                `New Sale: Bill #${payload.billNo}`,
                                `Amount: ₹${payload.total} • ${payload.label || 'POS'}`
                            );

                            // Show toast
                            showToast(`New Sale: Bill #${payload.billNo} - ₹${payload.total}`, 'success');
                        }

                        // ALWAYS send ACK back to POS, even for duplicates
                        // This tells the POS to stop retrying this specific bill
                        client.publish('mghr/sales/ack', JSON.stringify({ 
                            billNo: payload.billNo,
                            receivedAt: Date.now()
                        }), { qos: 1 });
                    } catch (e) {
                        console.error('Invalid payload', e);
                    }
                }
            });
        }

        // Initialize
        cleanOldData();
        render();
        setTimeout(initMQTT, 500);
        setInterval(cleanOldData, 1000 * 60 * 60);
    </script>
</body>
</html>
