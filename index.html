<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Live Sales Dash</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans antialiased">
    <div id="app" class="max-w-md mx-auto bg-white min-h-screen shadow-2xl flex flex-col relative pb-10">
        <!-- Header -->
        <header class="bg-gradient-to-r from-blue-700 to-blue-600 text-white p-4 shadow-md sticky top-0 z-10 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <i data-lucide="bar-chart-2" class="w-6 h-6"></i>
                <h1 class="text-xl font-bold tracking-wide">MGHR POS Live Sales</h1>
            </div>
            <div class="flex items-center gap-2 text-xs font-semibold bg-black/20 px-3 py-1 rounded-full">
                <div id="connection-status" class="w-2.5 h-2.5 rounded-full bg-red-400 animate-pulse"></div>
                <span id="connection-text">Connecting...</span>
            </div>
        </header>

        <!-- Notification Audio -->
        <audio id="notification-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

        <!-- Content -->
        <div class="flex-1 p-4 overflow-y-auto">
            <!-- Summary Card -->
            <div id="total-revenue" class="bg-blue-50 p-6 rounded-2xl mb-6 text-center shadow-sm border border-blue-100/50 relative overflow-hidden">
                <div class="absolute -right-4 -top-4 opacity-10">
                    <i data-lucide="indian-rupee" class="w-24 h-24 text-blue-600"></i>
                </div>
                <p class="text-sm text-blue-600 font-semibold mb-1 uppercase tracking-wider relative z-10">7 Days Revenue</p>
                <h2 class="text-4xl font-black text-blue-900 relative z-10" id="grand-total">₹0.00</h2>
            </div>

            <!-- List -->
            <div class="flex justify-between items-end mb-3 px-1">
                <h3 class="text-lg font-bold text-gray-800">Daily Records</h3>
                <button onclick="cleanOldData(true)" class="text-xs text-blue-600 font-bold hover:underline">Force Cleanup</button>
            </div>
            
            <div id="sales-list" class="space-y-3">
                <!-- Sales days will be injected here -->
                <div class="text-center text-gray-400 py-10 animate-pulse">Loading data...</div>
            </div>
        <footer><div class="flex justify-between items-end mb-3 px-1">
                <h3 class="text-lg font-bold text-gray-800"><br><br><br>Build by your साले साहब with Love</h3></footer>
        </div>
    </div>
    
    <script>
        lucide.createIcons();

        const MQTT_BROKER = 'wss://broker.hivemq.com:8884/mqtt';
        const MQTT_TOPIC = 'mghr/sales/v1';
        
        // Use a static, but unique-per-device client ID so persistent sessions work
        let localClientId = localStorage.getItem('mghr_sales_client_id');
        if (!localClientId) {
            localClientId = 'mghr_salesviewer_' + Math.random().toString(16).substr(2, 10);
            localStorage.setItem('mghr_sales_client_id', localClientId);
        }

        const clientId = localClientId;
        
        let salesData = JSON.parse(localStorage.getItem('mghr_sales_data') || '[]');
        
        // Clean up data older than 7 days
        function cleanOldData(force = false) {
            const beforeLength = salesData.length;
            const sevenDaysAgo = new Date();
            sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);
            sevenDaysAgo.setHours(0,0,0,0);
            
            salesData = salesData.filter(sale => {
                const saleDate = new Date(sale.timestamp);
                return saleDate >= sevenDaysAgo;
            });
            
            saveData();

            if (force && beforeLength === salesData.length) {
                alert('No data older than 7 days found.');
            } else if (force) {
                alert(`Cleaned up ${beforeLength - salesData.length} old records.`);
            }
        }

        function saveData() {
            localStorage.setItem('mghr_sales_data', JSON.stringify(salesData));
            render();
        }

        function render() {
            const grouped = {};
            let grandTotal = 0;

            salesData.forEach(sale => {
                const dateObj = new Date(sale.timestamp);
                const dateStr = dateObj.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
                
                if (!grouped[dateStr]) {
                    // Start of day for sorting
                    const startOfDay = new Date(dateObj);
                    startOfDay.setHours(0,0,0,0);
                    grouped[dateStr] = { total: 0, count: 0, sales: [], sortValue: startOfDay.getTime() };
                }
                const saleTotal = parseFloat(sale.total) || 0;
                grouped[dateStr].total += saleTotal;
                grouped[dateStr].count++;
                grouped[dateStr].sales.push(sale);
                grandTotal += saleTotal;
            });

            document.getElementById('grand-total').textContent = `₹${grandTotal.toFixed(2)}`;

            const listEl = document.getElementById('sales-list');
            listEl.innerHTML = '';

            const sortedDates = Object.keys(grouped).sort((a,b) => grouped[b].sortValue - grouped[a].sortValue);

            if(sortedDates.length === 0) {
                listEl.innerHTML = `
                    <div class="text-center text-gray-500 py-12 bg-gray-50 rounded-xl border border-dashed border-gray-300">
                        <i data-lucide="receipt" class="w-10 h-10 mx-auto text-gray-300 mb-2"></i>
                        <p class="font-medium">No recent sales data</p>
                        <p class="text-xs mt-1">Sales will appear here automatically.</p>
                    </div>`;
                lucide.createIcons();
                return;
            }

            sortedDates.forEach(date => {
                const group = grouped[date];
                const dayCard = document.createElement('div');
                dayCard.className = 'bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden transition-all';
                
                dayCard.innerHTML = `
                    <div class="bg-gray-50/80 flex justify-between items-center p-4 cursor-pointer hover:bg-blue-50/50 active:bg-blue-100/50 transition-colors" onclick="this.nextElementSibling.classList.toggle('hidden')">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center text-blue-600">
                                <i data-lucide="calendar" class="w-5 h-5"></i>
                            </div>
                            <div>
                                <div class="font-bold text-gray-800 text-sm">${date}</div>
                                <div class="text-xs font-semibold text-gray-500">${group.count} Bills Generated</div>
                            </div>
                        </div>
                        <div class="font-black text-green-600 text-lg">₹${group.total.toFixed(2)}</div>
                    </div>
                    <div class="hidden p-0 divide-y divide-gray-100 bg-white">
                        ${group.sales.sort((a,b)=>b.timestamp - a.timestamp).map(s => `
                            <div class="p-3 px-4 flex justify-between items-center hover:bg-gray-50">
                                <div>
                                    <span class="font-bold text-gray-700 text-sm">#${s.billNo}</span>
                                    <span class="text-xs font-semibold bg-gray-100 px-2 py-0.5 rounded ml-2 text-gray-600">${s.label || 'POS'}</span>
                                    <div class="text-xs text-gray-400 mt-1 flex items-center gap-1">
                                        <i data-lucide="clock" class="w-3 h-3"></i>
                                        ${new Date(s.timestamp).toLocaleTimeString('en-IN', {hour: '2-digit', minute:'2-digit'})}
                                    </div>
                                </div>
                                <div class="font-bold text-gray-800 text-sm">₹${parseFloat(s.total).toFixed(2)}</div>
                            </div>
                        `).join('')}
                    </div>
                `;
                listEl.appendChild(dayCard);
            });
            lucide.createIcons();
        }

        function initMQTT() {
            const statusEl = document.getElementById('connection-status');
            const statusText = document.getElementById('connection-text');
            
            // Connect to HiveMQ
            const client = mqtt.connect(MQTT_BROKER, {
                clientId: clientId,
                clean: false, // Important for receiving QoS 1 offline messages
                keepalive: 30,
                reconnectPeriod: 2000
            });

            client.on('connect', () => {
                console.log('Connected to MQTT');
                statusEl.className = 'w-2.5 h-2.5 rounded-full bg-green-400 animate-pulse';
                statusText.textContent = 'Live';
                statusText.className = 'text-green-100';
                
                // QoS 1 ensures we receive messages even if we were briefly offline
                client.subscribe(MQTT_TOPIC, { qos: 1 }, (err) => {
                    if (err) console.error('Subscribe err:', err);
                });
            });

            client.on('reconnect', () => {
                statusEl.className = 'w-2.5 h-2.5 rounded-full bg-yellow-400 animate-pulse';
                statusText.textContent = 'Reconnecting...';
                statusText.className = 'text-yellow-100';
            });

            client.on('offline', () => {
                statusEl.className = 'w-2.5 h-2.5 rounded-full bg-red-400';
                statusText.textContent = 'Offline';
                statusText.className = 'text-red-100';
            });

            client.on('message', (topic, message) => {
                if (topic === MQTT_TOPIC) {
                    try {
                        const payload = JSON.parse(message.toString());
                        
                        // Prevent duplicates (HiveMQ might resend QoS 1 messages if not ack'd)
                        const exists = salesData.some(s => s.billNo === payload.billNo && s.timestamp === payload.timestamp);
                        if (!exists) {
                            salesData.push(payload);
                            saveData();
                            
                            // Play sound securely (handling autoplay policies)
                            const audio = document.getElementById('notification-sound');
                            audio.currentTime = 0;
                            const playPromise = audio.play();
                            if (playPromise !== undefined) {
                                playPromise.catch(e => {
                                    console.log('Audio blocked by browser, user needs to interact first.');
                                });
                            }

                            // Confirm receipt back to POS
                            client.publish('mghr/sales/ack', JSON.stringify({ billNo: payload.billNo }), { qos: 1 });
                        }
                    } catch (e) {
                        console.error('Invalid payload', e);
                    }
                }
            });
        }

        // Initialize 
        cleanOldData();
        render(); // Also renders initials

        // Wait to attach MQTT to ensure UI is ready
        setTimeout(initMQTT, 500);

        // Daily cleanup interval
        setInterval(cleanOldData, 1000 * 60 * 60); 

    </script>
 
</body>
</html>
